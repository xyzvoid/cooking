# =============================================================================
#  config/build.conf — Kernel builder configuration
#  Values here are overridden by environment variables and CLI flags.
# =============================================================================

# ── Build identity ────────────────────────────────────────────────────────────
KERNEL_NAME="xyzvoid"
ARCH="arm64"
DEFCONFIG="X00T_defconfig"
TOOLCHAIN="gcc49"               # gcc49 | gcc_latest
JOBS=""                         # blank = auto (nproc)

# ── Source repositories ───────────────────────────────────────────────────────
KERNEL_REPO="https://github.com/xyzvoid/msm-4.4.git"
ANYKERNEL_REPO="https://github.com/xyzvoid/AnyKernel3.git"

# ── GitHub release target ─────────────────────────────────────────────────────
GH_RELEASE_REPO="xyzvoid/msm-4.4"
GH_RELEASE_BRANCH="android-4.4"

# ── Toolchain repos (used for gcc49 mode) ────────────────────────────────────
TC64_REPO="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9"
TC32_REPO="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9"

# ── Directory layout ──────────────────────────────────────────────────────────
# BUILD_ROOT defaults to ./build — change if you want a different location
# BUILD_ROOT="/mnt/storage/kernel_build"

# ── Secrets — prefer environment variables over storing here! ─────────────────
# TG_BOT_TOKEN=""
# TG_CHAT_ID=""
# GH_TOKEN=""
