name: 🔨 Build & Release — SDM660 / X00TD

# ─────────────────────────────────────────────────────────────────────────────
#  Full automated pipeline
#    1. Build msm-4.4 with selectable compiler:
#         • clang      — latest Google Clang (auto-resolved at runtime)
#         • gcc-4.9    — AOSP GCC 4.9 (aarch64-linux-android-4.9)
#         • gcc-latest — latest ARM GNU Toolchain (developer.arm.com)
#    2. Package with xyzvoid/AnyKernel3 → flashable zip
#    3. Create a GitHub Release on xyzvoid/msm-4.4
#    4. Send Telegram notifications (start / success+zip / failure+log)
#
#  Secrets (repo or org level)
#  ────────────────────────────
#  GH_PAT          classic PAT  (repo + workflow scopes)
#  TELEGRAM_TOKEN  Bot API token from @BotFather
#  TELEGRAM_CHAT   chat_id / channel_id  (e.g. -100xxxxxxxxxx)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '🏷 Build type'
        required: true
        default: release
        type: choice
        options: [ release, debug ]

      compiler:
        description: '🛠 Compiler'
        required: true
        default: clang
        type: choice
        options: [ clang, gcc-4.9, gcc-latest ]

      lto:
        description: '⚡ Link-Time Optimisation  (Clang=thin/full/none · GCC=full/none)'
        required: true
        default: thin
        type: choice
        options: [ thin, full, none ]

      kernelsu:
        description: '🔑 Patch KernelSU?'
        required: false
        default: 'false'
        type: choice
        options: [ 'false', 'true' ]

      create_release:
        description: '🚀 Create GitHub Release?'
        required: false
        default: 'true'
        type: choice
        options: [ 'true', 'false' ]

      release_tag:
        description: '🏷 Release tag  (blank = auto  vYYYYMMDD-HHMM)'
        required: false
        default: ''

      upload_modules:
        description: '📦 Upload .ko modules?'
        required: false
        default: 'true'
        type: choice
        options: [ 'true', 'false' ]


# ─────────────────────────────────────────────────────────────────────────────
env:
  # ── Source repos ──────────────────────────────────────────────────────────
  KERNEL_REPO:       xyzvoid/msm-4.4
  KERNEL_BRANCH:     main
  ANYKERNEL_REPO:    xyzvoid/AnyKernel3

  # ── Build config ──────────────────────────────────────────────────────────
  DEFCONFIG:   X00TD_defconfig
  ARCH:        arm64
  SUBARCH:     arm64
  DEVICE:      X00TD

  # ── Paths ─────────────────────────────────────────────────────────────────
  KERNEL_DIR:    ${{ github.workspace }}/kernel
  ANYKERNEL_DIR: ${{ github.workspace }}/anykernel
  CLANG_DIR:     ${{ github.workspace }}/toolchain/clang
  GCC64_DIR:     ${{ github.workspace }}/toolchain/gcc64
  GCC32_DIR:     ${{ github.workspace }}/toolchain/gcc32
  GCCARM_DIR:    ${{ github.workspace }}/toolchain/gcc-arm
  GCCARM32_DIR:  ${{ github.workspace }}/toolchain/gcc-arm32
  OUT:           ${{ github.workspace }}/out
  DIST:          ${{ github.workspace }}/dist

  # ── ccache ────────────────────────────────────────────────────────────────
  CCACHE_DIR:        ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE:    5G
  CCACHE_COMPRESS:   1
  CCACHE_COMPRESSLEVEL: 6

  # ── AOSP GCC mirror ───────────────────────────────────────────────────────
  GCC_BASE: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: >-
      🔨 ${{ github.event.inputs.build_type || 'release' }}
      · ${{ github.event.inputs.compiler || 'clang' }}
      · LTO=${{ github.event.inputs.lto || 'thin' }}
      · KSU=${{ github.event.inputs.kernelsu || 'false' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 150

    outputs:
      release_tag:    ${{ steps.meta.outputs.release_tag }}
      kernel_version: ${{ steps.meta.outputs.kernel_version }}
      kernel_commit:  ${{ steps.meta.outputs.kernel_commit }}
      zip_name:       ${{ steps.package.outputs.zip_name }}
      duration:       ${{ steps.timer_end.outputs.duration }}

    steps:

      # ── 0. Timer start ──────────────────────────────────────────────────
      - name: ⏱ Start timer
        id: timer_start
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      # ── 1. Host dependencies ────────────────────────────────────────────
      - name: 📦 Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates ccache \
            cpio curl flex gcc git gnupg2 jq kmod libelf-dev \
            libncurses-dev libssl-dev lz4 python3 rsync xz-utils zip

          # ── Ubuntu 24.04 compat: AOSP GCC 4.9 prebuilts link against
          #    libncurses.so.5 / libtinfo.so.5 which were removed in 24.04.
          #    Symlinking .so.6 → .so.5 lets the old binaries load correctly.
          for lib in libncurses libtinfo; do
            src="/usr/lib/x86_64-linux-gnu/${lib}.so.6"
            dst="/usr/lib/x86_64-linux-gnu/${lib}.so.5"
            [[ -f "$src" && ! -e "$dst" ]] && sudo ln -sf "$src" "$dst" && \
              echo "✅ Symlinked ${lib}.so.5 → .so.6"
          done

          # Put ccache wrappers first in PATH
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"

      # ── 2. Telegram — build started ─────────────────────────────────────
      - name: 📣 Telegram — build started
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT:  ${{ secrets.TELEGRAM_CHAT }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf --retry 3 -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d chat_id="${CHAT}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            -d text="$(cat <<EOF
🔨 <b>Kernel Build Started</b>

📱 Device    : <code>${{ env.DEVICE }} (SDM660)</code>
🌿 Branch    : <code>${{ env.KERNEL_BRANCH }}</code>
🏷 Type      : <code>${{ github.event.inputs.build_type  || 'release' }}</code>
🛠 Compiler  : <code>${{ github.event.inputs.compiler    || 'clang'   }}</code>
⚡ LTO       : <code>${{ github.event.inputs.lto         || 'thin'    }}</code>
🔑 KernelSU  : <code>${{ github.event.inputs.kernelsu    || 'false'   }}</code>
📋 Defconfig : <code>${{ env.DEFCONFIG }}</code>
👤 Triggered : <code>${{ github.actor }}</code>
🔢 Run       : <a href="${RUN_URL}">#${{ github.run_number }}</a>
EOF
          )" || true

      # ── 3. Checkout kernel ──────────────────────────────────────────────
      - name: 🔽 Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref:        ${{ env.KERNEL_BRANCH }}
          token:      ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 1
          path: kernel

      # ── 4. Checkout AnyKernel3 ──────────────────────────────────────────
      - name: 🔽 Checkout AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ANYKERNEL_REPO }}
          token:      ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 1
          path: anykernel

      # ════════════════════════════════════════════════════════════════════
      #  TOOLCHAIN — CLANG PATH
      # ════════════════════════════════════════════════════════════════════

      # ── 5a. Resolve latest Google Clang version ─────────────────────────
      - name: 🔍 Resolve latest Google Clang version
        id: clang_ver
        if: github.event.inputs.compiler == 'clang' || github.event.inputs.compiler == ''
        run: |
          LATEST=$(curl -sf --retry 3 \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+/refs/heads/main/?format=JSON" \
            | tail -n +2 \
            | python3 -c "
import sys, json, re
data = json.load(sys.stdin)
entries = data.get('entries', [])
tags = [e['name'] for e in entries if re.match(r'^clang-r[0-9a-f]+$', e.get('name',''))]
tags.sort()
print(tags[-1] if tags else 'clang-r547379b1')
" 2>/dev/null || echo "clang-r547379b1")
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "CLANG_VERSION=$LATEST" >> "$GITHUB_ENV"
          echo "✅ Resolved Clang: $LATEST"

      # ── 5b. Cache Clang ─────────────────────────────────────────────────
      - name: 💾 Cache Clang
        id: cache_clang
        if: github.event.inputs.compiler == 'clang' || github.event.inputs.compiler == ''
        uses: actions/cache@v4
        with:
          path: ${{ env.CLANG_DIR }}
          key:  clang-${{ steps.clang_ver.outputs.version }}-v1

      # ── 5c. Download Clang (if not cached) ──────────────────────────────
      - name: ⬇️  Download Google Clang
        if: >
          (github.event.inputs.compiler == 'clang' || github.event.inputs.compiler == '') &&
          steps.cache_clang.outputs.cache-hit != 'true'
        run: |
          VER="${{ steps.clang_ver.outputs.version }}"
          mkdir -p "$CLANG_DIR"
          URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${VER}.tar.gz"
          echo "⬇ $URL"
          curl -fL --retry 3 "$URL" -o /tmp/clang.tar.gz
          tar -xzf /tmp/clang.tar.gz -C "$CLANG_DIR"
          rm /tmp/clang.tar.gz
          "$CLANG_DIR/bin/clang" --version

      # ════════════════════════════════════════════════════════════════════
      #  TOOLCHAIN — AOSP GCC 4.9  (needed by all compiler paths as
      #  CAF scripts call gcc-version.sh with the android triplet)
      # ════════════════════════════════════════════════════════════════════

      # ── 6a. Cache AOSP GCC 4.9 ──────────────────────────────────────────
      - name: 💾 Cache AOSP GCC 4.9 toolchains
        id: cache_gcc49
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GCC64_DIR }}
            ${{ env.GCC32_DIR }}
          key: aosp-gcc-4.9-v2

      # ── 6b. Clone AOSP GCC 4.9 in parallel (if not cached) ──────────────
      - name: ⬇️  Clone AOSP GCC 4.9
        if: steps.cache_gcc49.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            "$GCC_BASE/aarch64/aarch64-linux-android-4.9.git" "$GCC64_DIR" &
          git clone --depth=1 \
            "$GCC_BASE/arm/arm-linux-androideabi-4.9.git"     "$GCC32_DIR" &
          wait
          echo "✅ AOSP GCC 4.9 cloned"

      # ── 6c. Smoke-test GCC 4.9 and record version ───────────────────────
      - name: 🔖 Record GCC 4.9 version
        if: github.event.inputs.compiler == 'gcc-4.9'
        run: |
          BIN="$GCC64_DIR/bin/aarch64-linux-android-gcc"
          if ! "$BIN" --version &>/dev/null; then
            echo "❌ AOSP GCC 4.9 binary failed to execute."
            echo "   This usually means a missing shared library."
            ldd "$BIN" || true
            exit 1
          fi
          VER=$("$BIN" --version 2>&1 | head -1)
          echo "GCC_VERSION=$VER" >> "$GITHUB_ENV"
          echo "✅ $VER"

      # ════════════════════════════════════════════════════════════════════
      #  TOOLCHAIN — ARM GNU TOOLCHAIN (gcc-latest)
      # ════════════════════════════════════════════════════════════════════

      # ── 7a. Resolve latest ARM GNU Toolchain version ─────────────────────
      - name: 🔍 Resolve latest ARM GNU Toolchain version
        id: armgcc_ver
        if: github.event.inputs.compiler == 'gcc-latest'
        run: |
          # Scrape the ARM downloads page for the newest aarch64-none-linux-gnu release.
          # Falls back to a known-good version if the page structure changes.
          LATEST=$(curl -sf --retry 3 \
            "https://developer.arm.com/downloads/-/arm-gnu-toolchain-downloads" \
            | grep -oP 'arm-gnu-toolchain-\K[0-9]+\.[0-9]+\.rel[0-9]+' \
            | sort -V | tail -1 \
            || echo "14.2.rel1")
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "ARMGCC_VERSION=$LATEST" >> "$GITHUB_ENV"
          echo "GCC_VERSION=arm-gnu-toolchain-${LATEST}" >> "$GITHUB_ENV"
          echo "✅ Resolved ARM GNU Toolchain: $LATEST"

      # ── 7b. Cache ARM GNU Toolchain ──────────────────────────────────────
      - name: 💾 Cache ARM GNU Toolchain
        id: cache_armgcc
        if: github.event.inputs.compiler == 'gcc-latest'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GCCARM_DIR }}
            ${{ env.GCCARM32_DIR }}
          key: arm-gnu-toolchain-${{ steps.armgcc_ver.outputs.version }}-v1

      # ── 7c. Download ARM GNU Toolchain in parallel (if not cached) ───────
      - name: ⬇️  Download ARM GNU Toolchain (latest)
        if: >
          github.event.inputs.compiler == 'gcc-latest' &&
          steps.cache_armgcc.outputs.cache-hit != 'true'
        run: |
          VER="${{ steps.armgcc_ver.outputs.version }}"
          BASE_URL="https://developer.arm.com/-/media/Files/downloads/gnu/${VER}/binrel"
          TARBALL64="arm-gnu-toolchain-${VER}-x86_64-aarch64-none-linux-gnu.tar.xz"
          TARBALL32="arm-gnu-toolchain-${VER}-x86_64-arm-none-linux-gnueabihf.tar.xz"

          mkdir -p "$GCCARM_DIR" "$GCCARM32_DIR"

          # Download both tarballs in parallel
          curl -fL --retry 3 "${BASE_URL}/${TARBALL64}" -o /tmp/gcc64.tar.xz &
          curl -fL --retry 3 "${BASE_URL}/${TARBALL32}" -o /tmp/gcc32.tar.xz &
          wait

          tar -xJf /tmp/gcc64.tar.xz -C "$GCCARM_DIR"   --strip-components=1 &
          tar -xJf /tmp/gcc32.tar.xz -C "$GCCARM32_DIR" --strip-components=1 &
          wait

          rm -f /tmp/gcc64.tar.xz /tmp/gcc32.tar.xz
          echo "✅ ARM GNU Toolchain ${VER} installed"
          "$GCCARM_DIR/bin/aarch64-none-linux-gnu-gcc" --version | head -1

      # ════════════════════════════════════════════════════════════════════
      #  SHARED: ccache + metadata
      # ════════════════════════════════════════════════════════════════════

      # ── 8. Restore ccache ───────────────────────────────────────────────
      - name: 💾 Restore ccache
        uses: actions/cache@v4
        with:
          path:         ${{ env.CCACHE_DIR }}
          key:          ccache-${{ runner.os }}-${{ env.DEFCONFIG }}-${{ github.event.inputs.compiler || 'clang' }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ env.DEFCONFIG }}-${{ github.event.inputs.compiler || 'clang' }}-
            ccache-${{ runner.os }}-${{ env.DEFCONFIG }}-

      # ── 9. Collect build metadata ────────────────────────────────────────
      - name: 🔖 Collect build metadata
        id: meta
        run: |
          cd "$KERNEL_DIR"
          KV=$(make -s kernelversion 2>/dev/null || echo "4.4")
          KC=$(git rev-parse --short HEAD)
          KM=$(git log -1 --pretty=%s)

          TAG="${{ github.event.inputs.release_tag }}"
          [[ -z "$TAG" ]] && TAG="v$(date -u +%Y%m%d-%H%M)"

          {
            echo "kernel_version=$KV"
            echo "kernel_commit=$KC"
            echo "commit_msg=$KM"
            echo "release_tag=$TAG"
          } >> "$GITHUB_OUTPUT"

          {
            echo "KERNEL_VERSION=$KV"
            echo "KERNEL_COMMIT=$KC"
            echo "RELEASE_TAG=$TAG"
          } >> "$GITHUB_ENV"

          echo "Kernel : $KV  commit : $KC  tag : $TAG"

      # ── 10. Patch KernelSU (optional) ────────────────────────────────────
      - name: 🔑 Patch KernelSU
        if: github.event.inputs.kernelsu == 'true'
        working-directory: kernel
        run: |
          curl -LSs --retry 3 \
            "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          KSU_VER=$(cat KernelSU/version 2>/dev/null || echo "unknown")
          echo "KSU_VERSION=$KSU_VER" >> "$GITHUB_ENV"
          echo "✅ KernelSU $KSU_VER patched"

      # ── 11. Configure build environment (PATH + compiler flags + LTO) ────
      #
      #  A sourced bash-array file (/tmp/kbuild_args.sh) is used instead of
      #  a single env string to avoid bash word-splitting collapsing adjacent
      #  make variable tokens on expansion.
      - name: 🛠 Configure build environment
        run: |
          COMPILER="${{ github.event.inputs.compiler || 'clang' }}"
          LTO_INPUT="${{ github.event.inputs.lto || 'thin' }}"

          # ── PATH: GCC 4.9 always present (CAF gcc-version.sh needs it)
          case "$COMPILER" in
            clang)
              printf '%s\n' \
                "${CLANG_DIR}/bin" \
                "${GCC64_DIR}/bin" \
                "${GCC32_DIR}/bin" \
              >> "$GITHUB_PATH"
              ;;
            gcc-4.9)
              printf '%s\n' \
                "${GCC64_DIR}/bin" \
                "${GCC32_DIR}/bin" \
              >> "$GITHUB_PATH"
              ;;
            gcc-latest)
              printf '%s\n' \
                "${GCCARM_DIR}/bin" \
                "${GCCARM32_DIR}/bin" \
                "${GCC64_DIR}/bin" \
                "${GCC32_DIR}/bin" \
              >> "$GITHUB_PATH"
              ;;
          esac

          # ── CROSS_COMPILE prefixes ───────────────────────────────────────
          case "$COMPILER" in
            clang|gcc-4.9)
              CROSS64="aarch64-linux-android-"
              CROSS32="arm-linux-androideabi-"
              ;;
            gcc-latest)
              CROSS64="aarch64-none-linux-gnu-"
              CROSS32="arm-none-linux-gnueabihf-"
              ;;
          esac
          echo "CROSS64=$CROSS64" >> "$GITHUB_ENV"
          echo "CROSS32=$CROSS32" >> "$GITHUB_ENV"

          # ── LTO flag ─────────────────────────────────────────────────────
          case "$COMPILER" in
            clang)
              case "$LTO_INPUT" in
                thin) LTO_ARG="LTO=thin" ;;
                full) LTO_ARG="LTO=full" ;;
                none) LTO_ARG=""         ;;
              esac
              ;;
            gcc-4.9|gcc-latest)
              case "$LTO_INPUT" in
                thin) LTO_ARG="LTO=full"
                      echo "⚠️  thin-LTO is Clang-only; promoting to full LTO for GCC" ;;
                full) LTO_ARG="LTO=full" ;;
                none) LTO_ARG=""         ;;
              esac
              ;;
          esac

          # ── Debug CFLAGS ─────────────────────────────────────────────────
          if [[ "${{ github.event.inputs.build_type || 'release' }}" == "debug" ]]; then
            EXTRA_CFLAGS="-g"
          else
            EXTRA_CFLAGS=""
          fi

          # ── Write /tmp/kbuild_args.sh ─────────────────────────────────────
          #   Note: heredoc markers must be flush-left for bash to terminate.
cat > /tmp/kbuild_args.sh << KBUILD_EOF
#!/usr/bin/env bash
# Auto-generated by "Configure build environment" — do not edit
KBUILD_COMMON=(
  O="${{ github.workspace }}/out"
  ARCH=arm64
  SUBARCH=arm64
  CROSS_COMPILE="${CROSS64}"
  CROSS_COMPILE_ARM32="${CROSS32}"
)
KBUILD_EOF

          case "$COMPILER" in
            clang)
cat >> /tmp/kbuild_args.sh << CLANG_EOF
KBUILD_COMPILER=(
  CC=clang
  CLANG_TRIPLE=aarch64-linux-gnu-
  LD=ld.lld
  AR=llvm-ar
  NM=llvm-nm
  OBJCOPY=llvm-objcopy
  OBJDUMP=llvm-objdump
  STRIP=llvm-strip
  HOSTCC=clang
  HOSTCXX=clang++
  HOSTLD=ld.lld
  HOSTAR=llvm-ar
)
CLANG_EOF
              ;;
            gcc-4.9|gcc-latest)
              printf 'KBUILD_COMPILER=()\n' >> /tmp/kbuild_args.sh
              ;;
          esac

cat >> /tmp/kbuild_args.sh << TAIL_EOF
KBUILD_LTO=(${LTO_ARG})
KBUILD_EXTRA=($([ -n "$EXTRA_CFLAGS" ] && echo "KCFLAGS=$EXTRA_CFLAGS"))
KBUILD_ALL=(
  "\${KBUILD_COMMON[@]}"
  "\${KBUILD_COMPILER[@]}"
  "\${KBUILD_LTO[@]}"
  "\${KBUILD_EXTRA[@]}"
)
TAIL_EOF

          chmod +x /tmp/kbuild_args.sh
          echo "── Generated /tmp/kbuild_args.sh ──────────────────────────"
          cat /tmp/kbuild_args.sh

          mkdir -p "$OUT" "$DIST"

          echo "── Summary ─────────────────────────────────────────────────"
          echo "COMPILER : $COMPILER"
          echo "LTO arg  : ${LTO_ARG:-<none>}"
          echo "CROSS64  : $CROSS64"
          echo "CROSS32  : $CROSS32"

      # ── 12. Load defconfig ───────────────────────────────────────────────
      - name: 📋 Load defconfig — ${{ env.DEFCONFIG }}
        working-directory: kernel
        run: |
          source /tmp/kbuild_args.sh
          echo "▶ make ${KBUILD_ALL[*]} $DEFCONFIG"
          make "${KBUILD_ALL[@]}" "$DEFCONFIG"

      # ── 13. Compile ──────────────────────────────────────────────────────
      - name: 🔨 Compile kernel  [${{ github.event.inputs.compiler || 'clang' }}]
        id: compile
        working-directory: kernel
        run: |
          set -o pipefail
          source /tmp/kbuild_args.sh
          JOBS=$(nproc --all)
          echo "▶ make  jobs=$JOBS  compiler=${{ github.event.inputs.compiler || 'clang' }}"
          echo "▶ args: ${KBUILD_ALL[*]}"
          make "${KBUILD_ALL[@]}" -j"$JOBS" 2>&1 | tee "$DIST/build.log"
          echo "✅ Compile finished"

      # ── 14. Collect images + modules ─────────────────────────────────────
      - name: 📦 Collect kernel images
        run: |
          BOOT="$OUT/arch/arm64/boot"
          [[ -f "$BOOT/Image"        ]] && cp "$BOOT/Image"        "$DIST/Image"
          [[ -f "$BOOT/Image.gz-dtb" ]] && cp "$BOOT/Image.gz-dtb" "$DIST/Image.gz-dtb"
          [[ -f "$BOOT/dtbo.img"     ]] && cp "$BOOT/dtbo.img"     "$DIST/dtbo.img"

          MODULE_COUNT=0
          if [[ "${{ github.event.inputs.upload_modules || 'true' }}" == "true" ]]; then
            find "$OUT" -name "*.ko" -exec cp {} "$DIST/" \;
            MODULE_COUNT=$(find "$DIST" -name "*.ko" | wc -l)
            [[ "$MODULE_COUNT" -gt 0 ]] && \
              (cd "$DIST" && zip -q modules.zip ./*.ko)
          fi
          echo "MODULE_COUNT=$MODULE_COUNT" >> "$GITHUB_ENV"
          echo "── dist ─────────────────────────────"
          ls -lh "$DIST"

      # ── 15. Package AnyKernel3 zip ───────────────────────────────────────
      - name: 📦 Package AnyKernel3 flashable zip
        id: package
        run: |
          TAG="$RELEASE_TAG"
          KSU_SUFFIX=""
          [[ "${{ github.event.inputs.kernelsu }}" == "true" ]] && KSU_SUFFIX="-KSU"
          COMPILER_SHORT="${{ github.event.inputs.compiler || 'clang' }}"
          ZIP_NAME="${{ env.DEVICE }}-kernel-${TAG}-${COMPILER_SHORT}${KSU_SUFFIX}.zip"

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

          if [[ -f "$DIST/Image.gz-dtb" ]]; then
            cp "$DIST/Image.gz-dtb" "$ANYKERNEL_DIR/Image.gz-dtb"
          elif [[ -f "$DIST/Image" ]]; then
            cp "$DIST/Image" "$ANYKERNEL_DIR/Image"
          else
            echo "❌ No kernel image found in $DIST"; exit 1
          fi
          [[ -f "$DIST/dtbo.img" ]] && cp "$DIST/dtbo.img" "$ANYKERNEL_DIR/dtbo.img"

          cd "$ANYKERNEL_DIR"
          zip -r9 "$DIST/$ZIP_NAME" . \
            --exclude='.git/*' \
            --exclude='*.md' \
            --exclude='LICENSE'

          echo "✅ Zip: $ZIP_NAME ($(du -sh "$DIST/$ZIP_NAME" | cut -f1))"

      # ── 16. Upload artifacts ──────────────────────────────────────────────
      - name: ⬆️  Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name:           ${{ steps.package.outputs.zip_name }}
          path:           ${{ env.DIST }}/${{ steps.package.outputs.zip_name }}
          retention-days: 14

      - name: ⬆️  Upload raw images
        uses: actions/upload-artifact@v4
        with:
          name: images-${{ steps.meta.outputs.kernel_commit }}-${{ github.run_number }}
          path: |
            ${{ env.DIST }}/Image
            ${{ env.DIST }}/Image.gz-dtb
            ${{ env.DIST }}/dtbo.img
          if-no-files-found: warn
          retention-days:   14

      - name: ⬆️  Upload modules
        if: >
          github.event.inputs.upload_modules != 'false' &&
          env.MODULE_COUNT != '0'
        uses: actions/upload-artifact@v4
        with:
          name:           modules-${{ steps.meta.outputs.kernel_commit }}-${{ github.run_number }}
          path:           ${{ env.DIST }}/modules.zip
          if-no-files-found: ignore
          retention-days: 14

      - name: ⬆️  Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:           build-log-${{ github.run_number }}
          path:           ${{ env.DIST }}/build.log
          retention-days: 7

      # ── 17. Stop timer ────────────────────────────────────────────────────
      - name: ⏱ Stop timer
        if: always()
        id: timer_end
        run: |
          END=$(date +%s)
          START=${{ steps.timer_start.outputs.start }}
          SECS=$(( END - START ))
          DUR=$(printf '%dm %02ds' $(( SECS/60 )) $(( SECS%60 )))
          echo "duration=$DUR" >> "$GITHUB_OUTPUT"
          echo "DURATION=$DUR" >> "$GITHUB_ENV"

      # ── 18. GitHub Release ────────────────────────────────────────────────
      - name: 🚀 Create GitHub Release
        if: >
          success() &&
          github.event.inputs.create_release == 'true' &&
          github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.meta.outputs.release_tag }}
          name:       "🔥 ${{ env.DEVICE }} Kernel ${{ steps.meta.outputs.release_tag }} [${{ github.event.inputs.compiler || 'clang' }}]"
          token:      ${{ secrets.GH_PAT || github.token }}
          repository: ${{ env.KERNEL_REPO }}
          draft:      false
          prerelease: false
          files: |
            ${{ env.DIST }}/${{ steps.package.outputs.zip_name }}
            ${{ env.DIST }}/Image
            ${{ env.DIST }}/Image.gz-dtb
            ${{ env.DIST }}/dtbo.img
          body: |
            ## 🔥 ${{ env.DEVICE }} Kernel · ${{ steps.meta.outputs.release_tag }}

            > Compiler **`${{ github.event.inputs.compiler || 'clang' }}`** ·
            > LTO `${{ github.event.inputs.lto || 'thin' }}` ·
            > ⏱ `${{ env.DURATION }}`

            ### 📱 Device
            | | |
            |-|-|
            | Device | Asus Zenfone Max Pro M1 (`${{ env.DEVICE }}`) |
            | SoC | Qualcomm Snapdragon 660 |
            | Base | Linux `${{ steps.meta.outputs.kernel_version }}` CAF msm-4.4 |

            ### 🧰 Toolchain
            | Tool | Details |
            |------|---------|
            | Compiler | `${{ github.event.inputs.compiler || 'clang' }}` — `${{ env.CLANG_VERSION }}${{ env.GCC_VERSION }}` |
            | GCC aarch64 | `aarch64-linux-android-4.9` / `aarch64-none-linux-gnu` |
            | GCC arm32 | `arm-linux-androideabi-4.9` / `arm-none-linux-gnueabihf` |
            | LTO | `${{ github.event.inputs.lto || 'thin' }}` |
            | KernelSU | `${{ github.event.inputs.kernelsu == 'true' && env.KSU_VERSION || 'No' }}` |

            ### 📝 Commit
            | | |
            |-|-|
            | Hash | [`${{ steps.meta.outputs.kernel_commit }}`](https://github.com/${{ env.KERNEL_REPO }}/commit/${{ steps.meta.outputs.kernel_commit }}) |
            | Message | ${{ steps.meta.outputs.commit_msg }} |

            ### 📦 Files
            | File | Notes |
            |------|-------|
            | `${{ steps.package.outputs.zip_name }}` | ✅ Flash via TWRP |
            | `Image.gz-dtb` | Kernel + appended DTBs |
            | `Image` | Raw uncompressed kernel |
            | `dtbo.img` | DTBO (if present) |

            ---
            > ⚠️ Back up your data before flashing. Use at your own risk.

      # ── 19. Telegram — success ────────────────────────────────────────────
      - name: 📣 Telegram — build success
        if: success()
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT:  ${{ secrets.TELEGRAM_CHAT }}
        run: |
          ZIP_PATH="$DIST/$ZIP_NAME"
          ZIP_SIZE_MB=$(du -sm "$ZIP_PATH" 2>/dev/null | cut -f1 || echo "0")
          RELEASE_URL="https://github.com/${{ env.KERNEL_REPO }}/releases/tag/${RELEASE_TAG}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          case "${{ github.event.inputs.compiler || 'clang' }}" in
            clang)      TOOLCHAIN_LINE="🔨 Clang    : <code>${CLANG_VERSION}</code>" ;;
            gcc-4.9)    TOOLCHAIN_LINE="🔨 GCC      : <code>${GCC_VERSION}</code>"  ;;
            gcc-latest) TOOLCHAIN_LINE="🔨 ARM GCC  : <code>${GCC_VERSION}</code>"  ;;
          esac

          CAPTION="$(cat <<EOF
✅ <b>Kernel Build Success!</b>

📱 <b>${{ env.DEVICE }}</b> · SDM660
🔖 Tag      : <code>${RELEASE_TAG}</code>
🐧 Version  : <code>${KERNEL_VERSION}</code>
🛠 Compiler : <code>${{ github.event.inputs.compiler || 'clang' }}</code>
${TOOLCHAIN_LINE}
⚡ LTO      : <code>${{ github.event.inputs.lto || 'thin' }}</code>
🔑 KernelSU : <code>${{ github.event.inputs.kernelsu == 'true' && env.KSU_VERSION || 'No' }}</code>
📝 Commit   : <code>${KERNEL_COMMIT}</code>
⏱ Duration  : <b>${DURATION}</b>
📦 Modules  : <code>${MODULE_COUNT}</code>

🚀 <a href="${RELEASE_URL}">GitHub Release</a>  ·  <a href="${RUN_URL}">Action Log</a>
EOF
          )"

          if [[ "$ZIP_SIZE_MB" -le 50 ]]; then
            curl -sf --retry 3 -X POST "https://api.telegram.org/bot${TOKEN}/sendDocument" \
              -F chat_id="${CHAT}" \
              -F parse_mode="HTML" \
              -F caption="${CAPTION}" \
              -F document="@${ZIP_PATH}" || true
          else
            curl -sf --retry 3 -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
              -d chat_id="${CHAT}" \
              -d parse_mode="HTML" \
              -d disable_web_page_preview="false" \
              -d text="${CAPTION}" || true
          fi

      # ── 20. Telegram — failure ────────────────────────────────────────────
      - name: 📣 Telegram — build failed
        if: failure()
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT:  ${{ secrets.TELEGRAM_CHAT }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          LOG_SNIPPET=""
          if [[ -f "$DIST/build.log" ]]; then
            LOG_SNIPPET=$(grep -iE "error:|fatal:|undefined" "$DIST/build.log" \
              | tail -20 \
              | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' || true)
          fi

          curl -sf --retry 3 -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d chat_id="${CHAT}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            -d text="$(cat <<EOF
❌ <b>Kernel Build Failed!</b>

📱 <b>${{ env.DEVICE }}</b> · SDM660
🌿 Branch   : <code>${{ env.KERNEL_BRANCH }}</code>
🏷 Type     : <code>${{ github.event.inputs.build_type || 'release' }}</code>
🛠 Compiler : <code>${{ github.event.inputs.compiler || 'clang' }}</code>
⚡ LTO      : <code>${{ github.event.inputs.lto || 'thin' }}</code>
⏱ Duration  : <b>${DURATION}</b>
🔢 Run      : <a href="${RUN_URL}">#${{ github.run_number }}</a>

<b>Last errors:</b>
<pre>${LOG_SNIPPET}</pre>
EOF
          )" || true

          if [[ -f "$DIST/build.log" ]]; then
            curl -sf --retry 3 -X POST "https://api.telegram.org/bot${TOKEN}/sendDocument" \
              -F chat_id="${CHAT}" \
              -F caption="📋 Full build log · Run #${{ github.run_number }}" \
              -F document="@${DIST}/build.log" || true
          fi

      # ── 21. Job summary ───────────────────────────────────────────────────
      - name: 📝 Write job summary
        if: always()
        run: |
          S="${{ job.status }}"
          [[ "$S" == "success" ]] && ICON="✅" || ICON="❌"
          HAS_IMG="❌"; HAS_GZ="❌"; HAS_DTBO="❌"; HAS_ZIP="❌"
          [[ -f "$DIST/Image"        ]] && HAS_IMG="✅"
          [[ -f "$DIST/Image.gz-dtb" ]] && HAS_GZ="✅"
          [[ -f "$DIST/dtbo.img"     ]] && HAS_DTBO="✅"
          [[ -f "$DIST/$ZIP_NAME"    ]] && HAS_ZIP="✅"

          case "${{ github.event.inputs.compiler || 'clang' }}" in
            clang)      TOOLCHAIN_DETAIL="${CLANG_VERSION}" ;;
            gcc-4.9)    TOOLCHAIN_DETAIL="${GCC_VERSION}"   ;;
            gcc-latest) TOOLCHAIN_DETAIL="${GCC_VERSION}"   ;;
          esac

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
## ${ICON} ${{ env.DEVICE }} Kernel — ${{ steps.meta.outputs.release_tag }}

| | |
|-|-|
| Status   | **${{ job.status }}** |
| Duration | **${DURATION}** |
| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

### 🧰 Toolchain
| Component | Details |
|-----------|---------|
| Compiler | \`${{ github.event.inputs.compiler || 'clang' }}\` |
| Version | \`${TOOLCHAIN_DETAIL}\` |
| LTO | \`${{ github.event.inputs.lto || 'thin' }}\` |
| KernelSU | \`${{ github.event.inputs.kernelsu == 'true' && env.KSU_VERSION || 'No' }}\` |

### 🐧 Kernel
| Field | Value |
|-------|-------|
| Version | \`${KERNEL_VERSION}\` |
| Commit | \`${KERNEL_COMMIT}\` |
| Defconfig | \`${{ env.DEFCONFIG }}\` |
| Build type | \`${{ github.event.inputs.build_type || 'release' }}\` |

### 📦 Artifacts
| File | |
|------|---|
| AnyKernel3 zip | ${HAS_ZIP} |
| \`Image\` | ${HAS_IMG} |
| \`Image.gz-dtb\` | ${HAS_GZ} |
| \`dtbo.img\` | ${HAS_DTBO} |
| Modules | \`${MODULE_COUNT}\` .ko files |
EOF
