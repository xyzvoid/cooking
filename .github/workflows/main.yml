# ─────────────────────────────────────────────────────────────────────────────
#  Full automated pipeline
#    1. Build msm-4.4  (github.com/xyzvoid/msm-4.4, X00TD_defconfig)
#         compiler choices: gcc-4.9 | gcc-latest
#    2. Package with AnyKernel3  →  flashable zip
#    3. Create a GitHub Release on xyzvoid/msm-4.4
#    4. Send Telegram notifications  (start / success+zip / failure+log)
#
#  Action versions pinned as of March 2026
#  ────────────────────────────────────────
#  actions/checkout          v4 → v6.0.2   (2026-01-09)
#  actions/upload-artifact   v4 → v7.0.0   (2026-02-26, Node 24)
#  softprops/action-gh-release v2.5.0      (2025-12-01) — still @v2 tag
#  runner image              ubuntu-22.04 → ubuntu-24.04 (ubuntu-latest since 2025-01-17)
#
#  Required secrets
#  ─────────────────
#  GH_PAT          classic PAT (repo + workflow scopes)
#  TELEGRAM_TOKEN  Bot token from @BotFather
#  TELEGRAM_CHAT   chat_id / channel_id (e.g. -100xxxxxxxxxx)
#
#  Place at: .github/workflows/build-kernel.yml
# ─────────────────────────────────────────────────────────────────────────────

name: Build Kernel

# Dynamic run title shown in the Actions tab run list
run-name: "Kernel · ${{ github.event.inputs.compiler || 'gcc-4.9' }} · branch: ${{ github.event.inputs.kernel_branch_custom || github.event.inputs.kernel_branch || 'main' }} · by @${{ github.actor }}"

on:
  # ── Manual trigger with compiler + branch selector ───────────────────────────
  workflow_dispatch:
    inputs:
      compiler:
        description: "Compiler toolchain"
        required: true
        default: gcc-4.9
        type: choice
        options:
          - gcc-4.9
          - gcc-latest

      kernel_branch:
        description: "Kernel branch (pick from list)"
        required: false
        default: main
        type: choice
        options:
          - main
          - master
          - staging
          - development
          - testing
          - stable

      kernel_branch_custom:
        description: "Custom kernel branch (overrides the picker above if set)"
        required: false
        default: ""
        type: string

  # ── Automatic on push to tracked branches ────────────────────────────────────
  push:
    branches:
      - main
      - master
      - staging

# ── Cancel stale runs for the same ref so we don't burn minutes needlessly ─────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Global least-privilege; the build job overrides to `contents: write` ───────
permissions:
  contents: read

# ── Path constants (workspace-relative; expand to absolute at runtime) ──────────
env:
  KERNEL_REPO:    xyzvoid/msm-4.4
  AK3_REPO:       xyzvoid/AnyKernel3
  AK3_BRANCH:     master
  DEFCONFIG:      X00TD_defconfig
  ARCH:           arm64
  SUBARCH:        arm64
  KERNEL_DIR:     ${{ github.workspace }}/kernel
  AK3_DIR:        ${{ github.workspace }}/AnyKernel3
  GCC49_DIR:          ${{ github.workspace }}/toolchains/gcc49
  GCC49_ARM32_DIR:    ${{ github.workspace }}/toolchains/gcc49-arm32
  GCC_LATEST_DIR:     ${{ github.workspace }}/toolchains/gcc-latest
  GCC_LATEST_ARM32_DIR: ${{ github.workspace }}/toolchains/gcc-latest-arm32
  OUT_DIR:            ${{ github.workspace }}/out

# ══════════════════════════════════════════════════════════════════════════════
jobs:
  build:
    name: "Build · ${{ github.event.inputs.compiler || 'gcc-4.9' }}"

    # ubuntu-latest → ubuntu-24.04 (GA since 2025-01-17)
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    # Write access required only for creating the Release + tag
    permissions:
      contents: write

    # Guarantee bash for every `run:` block regardless of runner OS defaults
    defaults:
      run:
        shell: bash

    steps:

      # ── 0. Resolve compiler + branch choice ───────────────────────────────
      - name: Resolve compiler and branch
        id: cfg
        run: |
          # ── Compiler ──────────────────────────────────────────────────────
          COMPILER="${{ github.event.inputs.compiler }}"
          COMPILER="${COMPILER:-gcc-4.9}"
          echo "compiler=${COMPILER}" >> "$GITHUB_OUTPUT"

          if [[ "${COMPILER}" == "gcc-4.9" ]]; then
            echo "compiler_tag=GCC-4.9-AOSP"  >> "$GITHUB_OUTPUT"
          else
            echo "compiler_tag=GCC-Latest-ARM" >> "$GITHUB_OUTPUT"
          fi

          # ── Branch resolution (priority order) ────────────────────────────
          #   1. Free-text custom input  (kernel_branch_custom)  — highest priority
          #   2. Dropdown picker         (kernel_branch)
          #   3. The git ref that triggered a push event         (GITHUB_REF_NAME)
          #   4. Hard-coded fallback: main
          CUSTOM="${{ github.event.inputs.kernel_branch_custom }}"
          CUSTOM="$(echo "${CUSTOM}" | xargs)"   # trim whitespace

          if [[ -n "${CUSTOM}" ]]; then
            BRANCH="${CUSTOM}"
            BRANCH_SOURCE="custom-input"
          elif [[ -n "${{ github.event.inputs.kernel_branch }}" ]]; then
            BRANCH="${{ github.event.inputs.kernel_branch }}"
            BRANCH_SOURCE="dropdown"
          elif [[ -n "${GITHUB_REF_NAME}" ]]; then
            BRANCH="${GITHUB_REF_NAME}"
            BRANCH_SOURCE="push-trigger"
          else
            BRANCH="main"
            BRANCH_SOURCE="fallback"
          fi

          echo "branch=${BRANCH}"               >> "$GITHUB_OUTPUT"
          echo "branch_source=${BRANCH_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "✅ Using branch '${BRANCH}' (source: ${BRANCH_SOURCE})"

      # ── 1. Telegram – build started ─────────────────────────────────────────
      - name: "Telegram · Build started"
        continue-on-error: true
        run: |
          TEXT=$(printf '%s\n' \
            "🔨 *Kernel build started*" \
            "• Repo: \`${KERNEL_REPO}\`" \
            "• Branch: \`${{ steps.cfg.outputs.branch }}\`" \
            "• Defconfig: \`${DEFCONFIG}\`" \
            "• Compiler: \`${{ steps.cfg.outputs.compiler_tag }}\`" \
            "• Triggered by: \`${{ github.actor }}\`" \
            "• Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
          )
          curl -sSf --retry 3 --retry-delay 5 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT }}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"

      # ── 2. Install build dependencies ───────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates curl \
            flex git libssl-dev libelf-dev lld llvm \
            python3 rsync unzip wget zip \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf

      # ── 3. Checkout kernel source ────────────────────────────────────────────
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref:        ${{ steps.cfg.outputs.branch }}
          token:      ${{ secrets.GH_PAT }}
          path:       kernel
          fetch-depth: 1

      # ── 4. Checkout AnyKernel3 ───────────────────────────────────────────────
      - name: Checkout AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: ${{ env.AK3_REPO }}
          ref:        ${{ env.AK3_BRANCH }}
          token:      ${{ secrets.GH_PAT }}
          path:       AnyKernel3
          fetch-depth: 1

      # ── 5a. Set up GCC 4.9 (AOSP prebuilt via LineageOS mirror) ─────────────
      - name: "Set up toolchain · GCC 4.9 (AOSP)"
        if: steps.cfg.outputs.compiler == 'gcc-4.9'
        run: |
          git clone --depth=1 \
            "https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git" \
            "$GCC49_DIR"

          git clone --depth=1 \
            "https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git" \
            "$GCC49_ARM32_DIR"

      # ── 5b. Set up latest ARM GNU Toolchain ──────────────────────────────────
      - name: "Set up toolchain · GCC latest (ARM GNU)"
        if: steps.cfg.outputs.compiler == 'gcc-latest'
        run: |
          DOWNLOAD_PAGE="https://developer.arm.com/downloads/-/arm-gnu-toolchain-downloads"
          PAGE_HTML=$(curl -sSf "${DOWNLOAD_PAGE}") || PAGE_HTML=""

          # ── arm64 (aarch64-none-linux-gnu) ───────────────────────────────────
          TARBALL_A64=$(echo "${PAGE_HTML}" \
            | grep -oP 'https://developer\.arm\.com/-/media/Files/downloads/gnu/[^"]+aarch64-none-linux-gnu\.tar\.xz' \
            | head -1) || true
          if [[ -z "${TARBALL_A64}" ]]; then
            echo "⚠️  arm64 scraping failed – using ARM GNU 13.3.rel1 fallback."
            TARBALL_A64="https://developer.arm.com/-/media/Files/downloads/gnu/13.3.rel1/binrel/arm-gnu-toolchain-13.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz"
          fi
          echo "Downloading arm64: ${TARBALL_A64}"
          wget -q --show-progress -O /tmp/gcc-a64.tar.xz "${TARBALL_A64}"
          mkdir -p "$GCC_LATEST_DIR"
          tar -xf /tmp/gcc-a64.tar.xz -C "$GCC_LATEST_DIR" --strip-components=1
          rm /tmp/gcc-a64.tar.xz

          # ── arm32 (arm-none-linux-gnueabihf) — required for compat vDSO ─────
          TARBALL_A32=$(echo "${PAGE_HTML}" \
            | grep -oP 'https://developer\.arm\.com/-/media/Files/downloads/gnu/[^"]+arm-none-linux-gnueabihf\.tar\.xz' \
            | head -1) || true
          if [[ -z "${TARBALL_A32}" ]]; then
            echo "⚠️  arm32 scraping failed – using ARM GNU 13.3.rel1 fallback."
            TARBALL_A32="https://developer.arm.com/-/media/Files/downloads/gnu/13.3.rel1/binrel/arm-gnu-toolchain-13.3.rel1-x86_64-arm-none-linux-gnueabihf.tar.xz"
          fi
          echo "Downloading arm32: ${TARBALL_A32}"
          wget -q --show-progress -O /tmp/gcc-a32.tar.xz "${TARBALL_A32}"
          mkdir -p "$GCC_LATEST_ARM32_DIR"
          tar -xf /tmp/gcc-a32.tar.xz -C "$GCC_LATEST_ARM32_DIR" --strip-components=1
          rm /tmp/gcc-a32.tar.xz

      # ── 6. Expose toolchain to all later steps ───────────────────────────────
      - name: Export toolchain environment
        run: |
          if [[ "${{ steps.cfg.outputs.compiler }}" == "gcc-4.9" ]]; then
            TC64_BIN="${GCC49_DIR}/bin"
            TC64_PREFIX="${TC64_BIN}/aarch64-linux-android-"
            TC32_BIN="${GCC49_ARM32_DIR}/bin"
            TC32_PREFIX="${TC32_BIN}/arm-linux-androideabi-"
          else
            TC64_BIN="${GCC_LATEST_DIR}/bin"
            TC64_PREFIX="${TC64_BIN}/aarch64-none-linux-gnu-"
            TC32_BIN="${GCC_LATEST_ARM32_DIR}/bin"
            TC32_PREFIX="${TC32_BIN}/arm-none-linux-gnueabihf-"
          fi

          echo "${TC64_BIN}" >> "$GITHUB_PATH"
          echo "${TC32_BIN}" >> "$GITHUB_PATH"

          echo "CROSS_COMPILE=${TC64_PREFIX}"       >> "$GITHUB_ENV"
          echo "CROSS_COMPILE_ARM32=${TC32_PREFIX}" >> "$GITHUB_ENV"

          "${TC64_PREFIX}gcc" --version \
            || { echo "❌ arm64 compiler not found: ${TC64_PREFIX}gcc"; exit 1; }
          "${TC32_PREFIX}gcc" --version \
            || { echo "❌ arm32 compiler not found: ${TC32_PREFIX}gcc"; exit 1; }

      # ── 7. Build the kernel ──────────────────────────────────────────────────
      - name: Build kernel
        id: build
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"

          BUILD_START=$(date +%s)

          make -s \
            O="$OUT_DIR" \
            ARCH="$ARCH" \
            SUBARCH="$SUBARCH" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            CROSS_COMPILE_ARM32="$CROSS_COMPILE_ARM32" \
            "$DEFCONFIG" 2>&1 | tee "$OUT_DIR/defconfig.log"

          make \
            O="$OUT_DIR" \
            ARCH="$ARCH" \
            SUBARCH="$SUBARCH" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            CROSS_COMPILE_ARM32="$CROSS_COMPILE_ARM32" \
            -j"$(nproc --all)" 2>&1 | tee "$OUT_DIR/build.log"

          BUILD_END=$(date +%s)
          DURATION=$(( BUILD_END - BUILD_START ))
          echo "duration=${DURATION}" >> "$GITHUB_OUTPUT"
          echo "✅ Finished in ${DURATION}s"

      # ── 8. Locate kernel image ───────────────────────────────────────────────
      - name: Locate kernel image
        id: image
        run: |
          IMAGE=$(find "$OUT_DIR" \
            \( -name "Image.gz-dtb" -o -name "Image.gz" \) -print -quit)
          if [[ -z "${IMAGE}" ]]; then
            echo "❌ No kernel image found under ${OUT_DIR}" >&2
            exit 1
          fi
          echo "path=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Found: ${IMAGE}"

      # ── 9. Package flashable zip via AnyKernel3 ──────────────────────────────
      - name: Package flashable zip
        id: zip
        run: |
          cp "${{ steps.image.outputs.path }}" "$AK3_DIR/"

          KVER=$(awk '
            /^VERSION/    { v=$3 }
            /^PATCHLEVEL/ { p=$3 }
            /^SUBLEVEL/   { s=$3 }
            END           { print v "." p "." s }
          ' "$KERNEL_DIR/Makefile")

          DATE=$(date +%Y%m%d-%H%M)
          COMPILER_SLUG=$(echo "${{ steps.cfg.outputs.compiler_tag }}" \
            | tr '[:upper:]' '[:lower:]' | tr ' ' '-')

          # Sanitise the branch name so it's safe to embed in a filename
          # (replace slashes and special chars with dashes)
          BRANCH_SLUG=$(echo "${{ steps.cfg.outputs.branch }}" \
            | sed 's|[^a-zA-Z0-9._-]|-|g')

          ZIP_NAME="kernel-${KVER}-X00TD-${BRANCH_SLUG}-${COMPILER_SLUG}-${DATE}.zip"
          ZIP_PATH="${{ github.workspace }}/${ZIP_NAME}"

          cd "$AK3_DIR"
          zip -r9 "${ZIP_PATH}" . \
            -x "*.git*" -x "*.github*" -x "LICENCE" -x "README.md"

          echo "path=${ZIP_PATH}"         >> "$GITHUB_OUTPUT"
          echo "name=${ZIP_NAME}"         >> "$GITHUB_OUTPUT"
          echo "kver=${KVER}"             >> "$GITHUB_OUTPUT"
          echo "date=${DATE}"             >> "$GITHUB_OUTPUT"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${ZIP_NAME}"

      # ── 10. Create GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          token:      ${{ secrets.GH_PAT }}
          repository: ${{ env.KERNEL_REPO }}
          tag_name:   "v${{ steps.zip.outputs.kver }}-${{ steps.zip.outputs.branch_slug }}-${{ steps.zip.outputs.date }}"
          name: >-
            Kernel ${{ steps.zip.outputs.kver }}
            · ${{ steps.cfg.outputs.compiler_tag }}
            · ${{ steps.cfg.outputs.branch }}
            · ${{ steps.zip.outputs.date }}
          body: |
            ## 📦 Kernel ${{ steps.zip.outputs.kver }} — ASUS X00TD

            | Field | Value |
            |---|---|
            | **Device** | ASUS ZenFone Max Pro M1 (X00TD) |
            | **Kernel** | `${{ steps.zip.outputs.kver }}` |
            | **Branch** | `${{ steps.cfg.outputs.branch }}` |
            | **Defconfig** | `${{ env.DEFCONFIG }}` |
            | **Compiler** | `${{ steps.cfg.outputs.compiler_tag }}` |
            | **Build time** | `${{ steps.build.outputs.duration }}s` |
            | **Triggered by** | @${{ github.actor }} |
            | **Commit** | `${{ github.sha }}` |

            ### Flash instructions
            1. Boot into TWRP / OrangeFox
            2. Flash the attached zip
            3. Reboot

            > Automated CI build — do not use on unsupported devices.
          files:                   ${{ steps.zip.outputs.path }}
          draft:                   false
          prerelease:              false
          generate_release_notes:  false
          fail_on_unmatched_files: true
          make_latest:             "true"

      # ── 11. Upload build log (always, including on failure) ──────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:              build-log-${{ github.run_number }}
          path:              ${{ env.OUT_DIR }}/build.log
          retention-days:    7
          if-no-files-found: warn

      # ── 12. Telegram – success ───────────────────────────────────────────────
      - name: "Telegram · Build succeeded"
        if: success()
        continue-on-error: true
        run: |
          D="${{ steps.build.outputs.duration }}"
          TEXT=$(printf '%s\n' \
            "✅ *Kernel build succeeded!*" \
            "• Device: \`X00TD\`" \
            "• Kernel: \`${{ steps.zip.outputs.kver }}\`" \
            "• Branch: \`${{ steps.cfg.outputs.branch }}\`" \
            "• Compiler: \`${{ steps.cfg.outputs.compiler_tag }}\`" \
            "• Build time: \`$(( D / 60 ))m $(( D % 60 ))s\`" \
            "• Release: [View on GitHub](${{ steps.release.outputs.url }})" \
            "• Zip: \`${{ steps.zip.outputs.name }}\`" \
          )
          curl -sSf --retry 3 --retry-delay 5 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT }}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"

          curl -sSf --retry 3 --retry-delay 5 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_CHAT }}" \
            -F "caption=📦 ${{ steps.zip.outputs.name }}" \
            -F "document=@${{ steps.zip.outputs.path }}"

      # ── 13. Telegram – failure ───────────────────────────────────────────────
      - name: "Telegram · Build failed"
        if: failure()
        continue-on-error: true
        run: |
          TEXT=$(printf '%s\n' \
            "❌ *Kernel build FAILED*" \
            "• Repo: \`${KERNEL_REPO}\`" \
            "• Branch: \`${{ steps.cfg.outputs.branch }}\`" \
            "• Compiler: \`${{ steps.cfg.outputs.compiler_tag }}\`" \
            "• Triggered by: \`${{ github.actor }}\`" \
            "• Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            "" \
            "Last 100 log lines attached 👇" \
          )
          curl -sSf --retry 3 --retry-delay 5 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT }}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"

          LOG="${OUT_DIR}/build.log"
          if [[ -f "${LOG}" ]]; then
            tail -100 "${LOG}" > /tmp/build-tail.log
            curl -sSf --retry 3 --retry-delay 5 -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument" \
              -F "chat_id=${{ secrets.TELEGRAM_CHAT }}" \
              -F "caption=🪵 Last 100 lines — run #${{ github.run_number }}" \
              -F "document=@/tmp/build-tail.log"
          fi
